server.port=${PORT:8080}
spring.application.name=AI Infotech Attendance System

# Excel file path (will be created automatically)
attendance.excel.path=attendance_records.xlsx

# Employee data file
attendance.employees.file=employees.json

# Allow CORS for frontend
spring.web.resources.static-locations=classpath:/static/

# ─── Email Configuration (Resend HTTPS API) ─────────────────────
# Get your API key from https://resend.com/api-keys
#
# EDIT THIS DIRECTLY for local testing (paste your key after the colon below).
# On Railway, you can instead set RESEND_API_KEY as an environment variable
# in the Variables tab — if set, it overrides whatever is written here.
# (Tip: don't commit a real key to a public git repo — use the env var there.)
resend.api.key=${RESEND_API_KEY:PASTE_YOUR_RESEND_API_KEY_HERE}

# Sender address must be on a domain you verified in Resend.
# Resend's onboarding domain "onboarding@resend.dev" works for testing,
# but only delivers to the email address you signed up to Resend with.
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ─── Email Report Settings ───────────────────────────────────────
# Recipient email address for reports.
# EDIT THIS DIRECTLY, or override with ATTENDANCE_EMAIL_TO env var on Railway.
attendance.email.to=${ATTENDANCE_EMAIL_TO:sr9941101@gmail.com}
# Sender display name
attendance.email.from-name=AI Infotech Attendance System
# Daily report time: HH:mm (24-hour), sent every day
attendance.email.daily-cron=0 0 18 * * *
# Weekly report: every Monday at 08:00
attendance.email.weekly-cron=0 0 8 * * MON

# ─── Admin Access ─────────────────────────────────────────────────
# ID required to unlock the Dashboard (admin) page.
# EDIT THIS DIRECTLY, or override with ADMIN_ACCESS_ID env var on Railway.
admin.access.id=${ADMIN_ACCESS_ID:ADMIN123}

# ─── Geo-Fencing Configuration ───────────────────────────────────
# Office location (latitude, longitude)
attendance.geo.office-lat=13.0827
attendance.geo.office-lon=80.2707
# Allowed radius in meters (default: 100m)
attendance.geo.radius-meters=100000
# Set to false to warn instead of block when outside radius
attendance.geo.enforce=true

