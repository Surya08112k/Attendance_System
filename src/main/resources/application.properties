server.port=${PORT:8080}
spring.application.name=QR Attendance System

# Excel file path (will be created automatically)
attendance.excel.path=attendance_records.xlsx

# Employee data file
attendance.employees.file=employees.json

# Allow CORS for frontend
spring.web.resources.static-locations=classpath:/static/

# ─── Email Configuration (Gmail SMTP) ───────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ─── Email Report Settings ───────────────────────────────────────
# Recipient email address for reports
attendance.email.to=hr@yourcompany.com
# Sender display name
attendance.email.from-name=QR Attendance System
# Daily report time: HH:mm (24-hour), sent every day
attendance.email.daily-cron=0 0 18 * * *
# Weekly report: every Monday at 08:00
attendance.email.weekly-cron=0 0 8 * * MON

# ─── Geo-Fencing Configuration ───────────────────────────────────
# Office location (latitude, longitude)
attendance.geo.office-lat=13.0827
attendance.geo.office-lon=80.2707
# Allowed radius in meters (default: 100m)
attendance.geo.radius-meters=1000
# Set to false to warn instead of block when outside radius
attendance.geo.enforce=true
