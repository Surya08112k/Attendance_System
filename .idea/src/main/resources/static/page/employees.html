<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees – QR Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-qrcode me-2"></i>QR Attendance</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/pages/scanner.html"><i class="fas fa-camera me-1"></i>Scanner</a></li>
                <li class="nav-item"><a class="nav-link" href="/pages/dashboard.html"><i class="fas fa-chart-bar me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/pages/employees.html"><i class="fas fa-users me-1"></i>Employees</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
        <div>
            <h2 class="fw-bold mb-0"><i class="fas fa-users text-primary me-2"></i>Employee Directory</h2>
            <p class="text-muted mb-0 small">View employee profiles and download individual QR codes.</p>
        </div>
        <input type="text" id="search-emp" class="form-control w-auto" placeholder="Search name or department…" oninput="filterEmployees()">
    </div>

    <!-- View toggle -->
    <div class="mb-4">
        <div class="btn-group" role="group">
            <button class="btn btn-primary active" id="btn-card" onclick="setView('card')">
                <i class="fas fa-th me-1"></i>Cards
            </button>
            <button class="btn btn-outline-primary" id="btn-list" onclick="setView('list')">
                <i class="fas fa-list me-1"></i>Table
            </button>
        </div>
    </div>

    <!-- Card view -->
    <div id="card-view">
        <div class="row g-4" id="employee-cards">
            <div class="col-12 text-center py-5 text-muted">Loading employees…</div>
        </div>
    </div>

    <!-- Table view -->
    <div id="list-view" style="display:none;">
        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Employee ID</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>QR Code</th>
                        </tr>
                    </thead>
                    <tbody id="employee-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- QR Modal -->
<div class="modal fade" id="qrModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4">
            <div class="modal-header border-0 justify-content-end pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <h5 class="fw-bold mb-1" id="modal-name"></h5>
            <p class="text-muted small mb-3" id="modal-dept"></p>
            <img id="modal-qr" src="" class="img-fluid mx-auto d-block mb-3 rounded shadow" style="max-width:280px;">
            <p class="text-muted small">Show this QR code at the scanner to mark attendance.</p>
            <a id="modal-download" href="#" download class="btn btn-primary">
                <i class="fas fa-download me-1"></i>Download QR Code
            </a>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
    <p class="mb-0 small">&copy; 2025 QR Attendance System</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let employees = [];
let viewMode  = 'card';

const DEPT_COLORS = {
    'Engineering':     'primary',
    'Human Resources': 'success',
    'Finance':         'warning',
    'Marketing':       'info',
    'Sales':           'danger',
    'Operations':      'secondary'
};

async function loadEmployees() {
    try {
        const res = await fetch('/api/employees');
        employees = await res.json();
        render();
    } catch (e) {
        document.getElementById('employee-cards').innerHTML =
            '<div class="col-12 text-center text-danger">Failed to load employees. Is the server running?</div>';
    }
}

function render() {
    const q   = document.getElementById('search-emp').value.toLowerCase();
    const filtered = employees.filter(e =>
        e.name.toLowerCase().includes(q) ||
        e.department.toLowerCase().includes(q) ||
        e.employeeId.toLowerCase().includes(q)
    );

    if (viewMode === 'card') renderCards(filtered);
    else renderTable(filtered);
}

function renderCards(list) {
    const container = document.getElementById('employee-cards');
    if (!list.length) {
        container.innerHTML = '<div class="col-12 text-center text-muted py-5">No employees found</div>';
        return;
    }
    container.innerHTML = list.map(emp => {
        const color = DEPT_COLORS[emp.department] || 'secondary';
        const initials = emp.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
        return `
        <div class="col-sm-6 col-lg-4 col-xl-3">
            <div class="card employee-card border-0 shadow-sm h-100 text-center p-4">
                <div class="avatar-circle bg-${color} text-white mx-auto mb-3"
                     style="width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:bold;">
                    ${initials}
                </div>
                <h6 class="fw-bold mb-1">${emp.name}</h6>
                <code class="text-muted small">${emp.employeeId}</code>
                <span class="badge bg-${color}-subtle text-${color} border border-${color} mt-2 mb-3">${emp.department}</span>
                <button class="btn btn-outline-primary btn-sm" onclick='showQR(${JSON.stringify(emp)})'>
                    <i class="fas fa-qrcode me-1"></i>View QR Code
                </button>
            </div>
        </div>`;
    }).join('');
}

function renderTable(list) {
    document.getElementById('employee-table-body').innerHTML = list.map((emp, i) => `
        <tr>
            <td>${i+1}</td>
            <td><code>${emp.employeeId}</code></td>
            <td class="fw-semibold">${emp.name}</td>
            <td>${emp.department}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary" onclick='showQR(${JSON.stringify(emp)})'>
                    <i class="fas fa-qrcode me-1"></i>QR
                </button>
            </td>
        </tr>
    `).join('');
}

function showQR(emp) {
    const qrUrl = `/api/employees/${emp.employeeId}/qrcode`;
    document.getElementById('modal-name').textContent = emp.name;
    document.getElementById('modal-dept').textContent = emp.employeeId + ' · ' + emp.department;
    document.getElementById('modal-qr').src = qrUrl;
    const dl = document.getElementById('modal-download');
    dl.href = qrUrl;
    dl.download = `QR_${emp.employeeId}.png`;
    new bootstrap.Modal(document.getElementById('qrModal')).show();
}

function filterEmployees() { render(); }

function setView(mode) {
    viewMode = mode;
    document.getElementById('card-view').style.display = mode === 'card' ? '' : 'none';
    document.getElementById('list-view').style.display = mode === 'list' ? '' : 'none';
    document.getElementById('btn-card').className = 'btn ' + (mode === 'card' ? 'btn-primary active' : 'btn-outline-primary');
    document.getElementById('btn-list').className = 'btn ' + (mode === 'list' ? 'btn-primary active' : 'btn-outline-primary');
    render();
}

loadEmployees();
</script>
</body>
</html>
